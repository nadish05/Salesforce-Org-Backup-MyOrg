<template>

    <lightning-card
        title="Salesforce Metadata Backup Platform"
        icon-name="standard:knowledge"
    >

        <div class="container">

            <!-- ===================================== -->
            <!-- Salesforce Connected App -->
            <!-- ===================================== -->

            <div class="section">

                <h2 class="section-title">

                    Salesforce Connected App

                </h2>

                <lightning-input
                    label="Client ID"
                    value={clientId}
                    onchange={handleClientIdChange}
                >
                </lightning-input>

                <lightning-input
                    type="password"
                    label="Client Secret"
                    value={clientSecret}
                    onchange={handleClientSecretChange}
                    class="slds-m-top_small"
                >
                </lightning-input>

                <lightning-combobox
                    label="Environment"
                    value={environment}
                    options={environmentOptions}
                    onchange={handleEnvironmentChange}
                    class="slds-m-top_small"
                >
                </lightning-combobox>

            </div>

            <!-- ===================================== -->
            <!-- GitHub Repo -->
            <!-- ===================================== -->

            <div class="section">

                <h2 class="section-title">

                    GitHub Repository

                </h2>

                <lightning-input
                    label="Repository URL"
                    value={repoUrl}
                    onchange={handleRepoChange}
                >
                </lightning-input>

            </div>

            <!-- ===================================== -->
            <!-- Status -->
            <!-- ===================================== -->

            <div class="section">

                <h2 class="section-title">

                    Backup Status

                </h2>

                <div class="status-box">

                    {currentStep}

                </div>

            </div>

            <!-- ===================================== -->
            <!-- Logs -->
            <!-- ===================================== -->

            <div class="section">

                <h2 class="section-title">

                    Live Logs

                </h2>

                <div class="log-box">

                    <template
                        for:each={logs}
                        for:item="log"
                    >

                        <div
                            key={log}
                            class="log-line"
                        >

                            {log}

                        </div>

                    </template>

                </div>

            </div>

            <!-- ===================================== -->
            <!-- Start Button -->
            <!-- ===================================== -->

            <div class="section">

                <lightning-button

                    label="Start Backup"

                    variant="brand"

                    onclick={startBackup}

                    disabled={loading}

                >
                </lightning-button>

            </div>

            <!-- ===================================== -->
            <!-- Spinner -->
            <!-- ===================================== -->

            <template if:true={loading}>

                <lightning-spinner
                    alternative-text="Loading"
                    size="medium"
                >
                </lightning-spinner>

            </template>

        </div>

    </lightning-card>

</template>
