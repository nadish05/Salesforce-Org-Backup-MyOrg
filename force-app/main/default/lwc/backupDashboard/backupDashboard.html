<template>

    <lightning-card
        title="Salesforce Metadata Backup Platform"
        icon-name="standard:knowledge"
    >

        <div class="container">

            <!-- ===================================== -->
            <!-- Salesforce Connected App -->
            <!-- ===================================== -->

            <div class="section">

                <h2 class="section-title">

                    Salesforce Connected App

                </h2>

                <lightning-input
                    label="Client ID"
                    value={clientId}
                    onchange={handleClientIdChange}
                >
                </lightning-input>

                <lightning-input
                    type="password"
                    label="Client Secret"
                    value={clientSecret}
                    onchange={handleClientSecretChange}
                    class="slds-m-top_small"
                >
                </lightning-input>

                <lightning-combobox
                    label="Environment"
                    value={environment}
                    options={environmentOptions}
                    onchange={handleEnvironmentChange}
                    class="slds-m-top_small"
                >
                </lightning-combobox>

                <!-- ================================= -->
                <!-- Connect Button -->
                <!-- ================================= -->

                <div class="slds-m-top_medium">

                    <lightning-button

                        label="Connect Salesforce"

                        variant="brand"

                        onclick={connectSalesforce}

                        disabled={loading}

                    >
                    </lightning-button>

                </div>

                <!-- ================================= -->
                <!-- Connection Status -->
                <!-- ================================= -->

                <div class="slds-m-top_medium">

                    <template if:true={isConnected}>

                        <div class="slds-text-color_success">

                            ✅ Salesforce Org Connected

                        </div>

                    </template>

                    <template if:false={isConnected}>

                        <div class="slds-text-color_error">

                            ❌ Salesforce Org Not Connected

                        </div>

                    </template>

                </div>

            </div>

            <!-- ===================================== -->
            <!-- GitHub Repository -->
            <!-- ===================================== -->

            <div class="section">

                <h2 class="section-title">

                    GitHub Repository

                </h2>

                <lightning-input
                    label="Repository URL"
                    value={repoUrl}
                    onchange={handleRepoChange}
                >
                </lightning-input>

            </div>

            <!-- ===================================== -->
            <!-- Start Backup -->
            <!-- ===================================== -->

            <div class="section">

                <lightning-button

                    label="Start Backup"

                    variant="success"

                    onclick={startBackup}

                    disabled={loading}

                >
                </lightning-button>

            </div>

            <!-- ===================================== -->
            <!-- Backup Status -->
            <!-- ===================================== -->

            <div class="section">

                <h2 class="section-title">

                    Backup Status

                </h2>

                <div class="status-box">

                    {currentStep}

                </div>

            </div>

            <!-- ===================================== -->
            <!-- Live Logs -->
            <!-- ===================================== -->

            <div class="section">

                <h2 class="section-title">

                    Live Logs

                </h2>

                <div class="log-box">

                    <template
                        for:each={logs}
                        for:item="log"
                    >

                        <div
                            key={log}
                            class="log-line"
                        >

                            {log}

                        </div>

                    </template>

                </div>

            </div>

            <!-- ===================================== -->
            <!-- Spinner -->
            <!-- ===================================== -->

            <template if:true={loading}>

                <lightning-spinner
                    alternative-text="Loading"
                    size="medium"
                >
                </lightning-spinner>

            </template>

        </div>

    </lightning-card>

</template>
