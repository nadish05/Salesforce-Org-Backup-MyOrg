<template>

    <!-- ===================================== -->
    <!-- Main Card -->
    <!-- ===================================== -->

    <lightning-card
        title="Salesforce Metadata Backup Platform"
        icon-name="standard:knowledge"
    >

        <div class="slds-p-around_medium">

            <!-- ===================================== -->
            <!-- Salesforce Connection -->
            <!-- ===================================== -->

            <div class="section">

                <h2 class="section-title">
                    Salesforce Connection
                </h2>

                <template if:true={isConnected}>

                    <div class="status success">

                        🟢 Connected Successfully

                    </div>

                    <p class="org-info">
                        {connectedOrg}
                    </p>

                </template>

                <template if:false={isConnected}>

                    <div class="status warning">

                        🔴 Not Connected

                    </div>

                </template>

                <lightning-button
                    label="Connect Salesforce"
                    variant="brand"
                    onclick={connectSalesforce}
                    class="slds-m-top_small"
                >
                </lightning-button>

            </div>

            <!-- ===================================== -->
            <!-- Session ID -->
            <!-- ===================================== -->

            <div class="section">

                <lightning-input
                    label="Session ID"
                    value={sessionId}
                    onchange={handleSessionChange}
                >
                </lightning-input>

            </div>

            <!-- ===================================== -->
            <!-- GitHub Repo -->
            <!-- ===================================== -->

            <div class="section">

                <lightning-input
                    label="GitHub Repository URL"
                    value={repoUrl}
                    onchange={handleRepoChange}
                >
                </lightning-input>

            </div>

            <!-- ===================================== -->
            <!-- Status -->
            <!-- ===================================== -->

            <div class="section">

                <h2 class="section-title">
                    Backup Status
                </h2>

                <div class="status-box">

                    {currentStep}

                </div>

            </div>

            <!-- ===================================== -->
            <!-- Logs -->
            <!-- ===================================== -->

            <div class="section">

                <h2 class="section-title">
                    Logs
                </h2>

                <div class="log-box">

                    <template
                        for:each={logs}
                        for:item="log"
                    >

                        <p key={log}>
                            {log}
                        </p>

                    </template>

                </div>

            </div>

            <!-- ===================================== -->
            <!-- Button -->
            <!-- ===================================== -->

            <div class="section">

                <lightning-button
                    label="Start Backup"
                    variant="success"
                    onclick={startBackup}
                    disabled={loading}
                >
                </lightning-button>

            </div>

            <!-- ===================================== -->
            <!-- Spinner -->
            <!-- ===================================== -->

            <template if:true={loading}>

                <lightning-spinner
                    alternative-text="Loading"
                    size="medium"
                >
                </lightning-spinner>

            </template>

        </div>

    </lightning-card>

</template>
