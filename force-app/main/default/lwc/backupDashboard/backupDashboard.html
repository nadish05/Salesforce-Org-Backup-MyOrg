<template>

    <div class="page-bg">

        <!-- =========================================
             HERO SECTION
        ========================================== -->

        <div class="hero-section">

            <div>

                <h1 class="hero-title">
                    Salesforce Metadata Backup
                </h1>

                <p class="hero-subtitle">
                    Securely connect Salesforce orgs and push metadata backups directly to GitHub.
                </p>

            </div>

            <div class="hero-status">

                <template if:true={isConnected}>

                    <div class="connected-pill success">
                        ● Connected
                    </div>

                </template>

                <template if:false={isConnected}>

                    <div class="connected-pill danger">
                        ● Not Connected
                    </div>

                </template>

            </div>

        </div>

        <!-- =========================================
             MAIN DASHBOARD GRID
        ========================================== -->

        <div class="dashboard-grid">

            <!-- =====================================
                 LEFT PANEL
            ====================================== -->

            <div class="left-panel">

                <!-- =================================
                     SALESFORCE CONNECTION CARD
                ================================== -->

                <div class="glass-card">

                    <div class="card-header">

                        <div>

                            <h2>
                                Salesforce Connection
                            </h2>

                            <p>
                                Connect any Salesforce org using Connected App credentials.
                            </p>

                        </div>

                    </div>

                    <!-- =============================
                         CONNECTED APP GUIDE
                    ============================== -->

                    <div class="setup-guide">

                        <h3>
                            Connected App Setup Guide
                        </h3>

                        <ol>

                            <li>
                                Open Salesforce Setup
                            </li>

                            <li>
                                Navigate to App Manager
                            </li>

                            <li>
                                Create a Connected App
                            </li>

                            <li>
                                Enable OAuth Settings
                            </li>

                            <li>
                                Add Callback URL:
                                <br/>

                                <span class="callback-url">
                                    https://salesforce-backup-backend-1.onrender.com/auth/salesforce/callback
                                </span>

                            </li>

                            <li>
                                Add OAuth Scope:
                                <br/>
                                Full Access (full)
                            </li>

                            <li>
                                Copy Client ID and Client Secret
                            </li>

                        </ol>

                    </div>

                    <!-- =============================
                         FORM SECTION
                    ============================== -->

                    <div class="form-section">

                        <div class="custom-input">

                            <lightning-input
                                label="Client ID"
                                value={clientId}
                                onchange={handleClientIdChange}
                            >
                            </lightning-input>

                        </div>

                        <div class="custom-input">

                            <lightning-input
                                type="password"
                                label="Client Secret"
                                value={clientSecret}
                                onchange={handleClientSecretChange}
                            >
                            </lightning-input>

                        </div>

                        <div class="custom-input">

                            <lightning-combobox
                                label="Environment"
                                value={environment}
                                options={environmentOptions}
                                onchange={handleEnvironmentChange}
                            >
                            </lightning-combobox>

                        </div>

                        <div class="button-row">

                            <lightning-button
                                label="Connect Salesforce"
                                variant="brand"
                                onclick={connectSalesforce}
                                disabled={loading}
                                class="main-btn"
                            >
                            </lightning-button>

                        </div>

                    </div>

                </div>

                <!-- =================================
                     GITHUB CARD
                ================================== -->

                <div class="glass-card">

                    <div class="card-header">

                        <div>

                            <h2>
                                GitHub Repository
                            </h2>

                            <p>
                                Enter the repository where metadata backups should be pushed.
                            </p>

                        </div>

                    </div>

                    <div class="form-section">

                        <div class="custom-input">

                            <lightning-input
                                label="Repository URL"
                                value={repoUrl}
                                onchange={handleRepoChange}
                            >
                            </lightning-input>

                        </div>

                        <div class="button-row">

                            <lightning-button
                                label="Start Backup"
                                variant="success"
                                onclick={startBackup}
                                disabled={loading}
                                class="main-btn"
                            >
                            </lightning-button>

                        </div>

                    </div>

                </div>

            </div>

            <!-- =====================================
                 RIGHT PANEL
            ====================================== -->

            <div class="right-panel">

                <!-- =================================
                     STATUS CARD
                ================================== -->

                <div class="glass-card status-card">

                    <div class="status-header">

                        <h2>
                            Backup Status
                        </h2>

                    </div>

                    <div class="status-content">

                        <div class="status-indicator"></div>

                        <div>

                            <div class="status-label">
                                Current Process
                            </div>

                            <div class="status-text">
                                {currentStep}
                            </div>

                        </div>

                    </div>

                </div>

                <!-- =================================
                     LOGS CARD
                ================================== -->

                <div class="glass-card logs-card">

                    <div class="logs-header">

                        <h2>
                            Live Logs
                        </h2>

                    </div>

                    <div class="logs-container">

                        <template if:true={logs.length}>

                            <template
                                for:each={logs}
                                for:item="log"
                            >

                                <div
                                    key={log}
                                    class="log-item"
                                >

                                    {log}

                                </div>

                            </template>

                        </template>

                        <template if:false={logs.length}>

                            <div class="empty-logs">

                                No logs yet.
                                Start a backup to see live activity.

                            </div>

                        </template>

                    </div>

                </div>

            </div>

        </div>

        <!-- =========================================
             LOADING OVERLAY
        ========================================== -->

        <template if:true={loading}>

            <div class="loading-overlay">

                <div class="loading-card">

                    <lightning-spinner
                        alternative-text="Loading"
                        size="medium"
                    >
                    </lightning-spinner>

                    <div class="loading-text">
                        {currentStep}
                    </div>

                </div>

            </div>

        </template>

    </div>

</template>
